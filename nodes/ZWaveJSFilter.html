<script type="text/template" id="ZWJS_TPL_Filter">
	<div style="padding:5px">
		<div class="form-row">
			<labe><i class="fa fa-tag"></i> Name</label>
			<input type="text" name="zwjz-f-name">
		</div>
		<div class="form-row">
			<label><i class="fa fa-search"></i> Class</label>
			<select name="zwjz-f-cc">
				<option value="">Select Command Class</option>
			</select>
		</div>
		<div class="form-row">
			<label><i class="fa fa-info-circle"></i> Property</label>
			<select name="zwjz-f-p">
				<option value="">Select Property</option>
			</select>
		</div>
		<div class="form-row">
			<label><i class="fa fa-info-circle"></i> Key</label>
			<select name="zwjz-f-pk">
				<option value="">Select Property Key (If applicable)</option>
			</select>
		</div>
	</div>
</script>

<script type="text/javascript">
	const FilterTemplate = Handlebars.compile($('#ZWJS_TPL_Filter').html());
	let ZWJSIndexMap = undefined;
	function ZWJSGenerateFilterUUID() {
		var d = new Date().getTime();
		var d2 = (typeof performance !== 'undefined' && performance.now && performance.now() * 1000) || 0;
		return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
			var r = Math.random() * 16;
			if (d > 0) {
				r = (d + r) % 16 | 0;
				d = Math.floor(d / 16);
			} else {
				r = (d2 + r) % 16 | 0;
				d2 = Math.floor(d2 / 16);
			}
			return (c === 'x' ? r : (r & 0x3) | 0x8).toString(16);
		});
	}
	const ZWJSFilterNodeSettings = {
		category: 'ZWave JS',
		color: 'rgb(46,145,205)',
		defaults: {
			name: {
				value: 'ZWave Event Filter',
				required: true
			},
			filters: { value: [] },
			outputs: { value: 0 }
		},
		inputs: 1,
		outputs: 1,
		icon: 'Filter.svg',
		label: function () {
			return this.name;
		},
		paletteLabel: 'Event Filter',
		oneditprepare: SortUI
	};

	RED.nodes.registerType('zwavejs-filter', ZWJSFilterNodeSettings);

	function SortUI() {
		ZWJSIndexMap = {};
		$('#filtersets').editableList({
			header: $('<div>').append('<div>Filter Sets - order defines outputs</div>'),
			sortable: true,
			removable: true,
			addButton: 'Add Filter Set',
			addItem: AddItem
			//sortItems: SortItems,
			//removeItem: RemoveItem
		});

		this.filters.sort(compare).forEach((Item) => {
			$('#filtersets').editableList('addItem', Item);
		});
	}

	function populateCCDropdown(container) {
		const ccSelect = $(container).find('[name="zwjz-f-cc"]');
		const propertySelect = $(container).find('[name="zwjz-f-p"]');
		const propertyKeySelect = $(container).find('[name="zwjz-f-pk"]');

		// Store mapping from property → array of propertyKeys
		let propertyKeyMap = {};

		$.getJSON('zwave-js/ui/global/getcclist', (CCList) => {
			if (!CCList.callSuccess) return;

			// Populate CC dropdown
			CCList.response.forEach((CC) => {
				ccSelect.append(new Option(CC, CC));
			});

			// Handle CC change
			ccSelect.off('change').on('change', function () {
				const ccValue = $(this).val();
				propertySelect.empty();
				propertyKeySelect.empty().hide();
				propertyKeyMap = {}; // Reset map

				$.getJSON(`zwave-js/ui/global/getccproperties/${ccValue}`, (PropList) => {
					if (!PropList.callSuccess) return;

					// Build map: property → array of keys
					PropList.response.forEach((P) => {
						const keyArray = Array.isArray(P.propertyKey)
							? P.propertyKey
							: P.propertyKey !== undefined
								? [P.propertyKey]
								: [];

						if (propertyKeyMap[P.property]) {
							propertyKeyMap[P.property] = propertyKeyMap[P.property].concat(keyArray);
						} else {
							propertyKeyMap[P.property] = keyArray;
						}

						// Add property to dropdown if not already there
						if (!propertySelect.find(`option[value="${P.property}"]`).length) {
							propertySelect.append(new Option(P.property, P.property));
						}
					});
				});
			});

			// Handle property change
			propertySelect.off('change').on('change', function () {
				const selectedProperty = $(this).val();
				const keys = propertyKeyMap[selectedProperty] || [];

				propertyKeySelect.empty();

				if (keys.length > 0) {
					keys.forEach((k) => {
						propertyKeySelect.append(new Option(k, k));
					});
					propertyKeySelect.show();
				} else {
					propertyKeySelect.hide();
				}
			});
		});
	}

	function AddItem(container, index, data) {
		if (!data.id) {
			data.index = index;
			data.name = 'Filter Name';
			data.id = ZWJSGenerateFilterUUID();
		}

		data.originalIndex = index;
		ZWJSIndexMap[data.originalIndex] = index;
		$(container).data('data', data);
		$(container).css({ minWidth: '400px' });
		$(container).append(FilterTemplate(data));

		populateCCDropdown(container);
	}
</script>
